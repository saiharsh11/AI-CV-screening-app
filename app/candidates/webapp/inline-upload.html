<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>CV Upload</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: '72', '72full', Arial, sans-serif; background: transparent; color: #1d2d3e; }
.widget { padding: 1rem 1.25rem 1.5rem; }

/* ── Drop zone ── */
.drop-zone {
  border: 2px dashed #cdd5e0; border-radius: 10px;
  padding: 1.4rem 1rem; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s; background: #fafbfc;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: #0070f2; background: #f0f7ff; }
.drop-zone.has-file { border-color: #2e7d32; background: #f1faf1; }
.drop-icon {
  width: 2.4rem; height: 2.4rem; background: #e8f0fe; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; margin: 0 auto .55rem;
}
.drop-icon svg { width: 1.2rem; height: 1.2rem; fill: #0070f2; }
.drop-zone.has-file .drop-icon { background: #e8f5e9; }
.drop-zone.has-file .drop-icon svg { fill: #2e7d32; }
.drop-title { font-size: .88rem; font-weight: 600; color: #1d2d3e; margin-bottom: .18rem; }
.drop-sub   { font-size: .77rem; color: #89919a; }
.drop-browse {
  display: inline-block; margin-top: .55rem; padding: .32rem .85rem;
  border: 1.5px solid #0070f2; border-radius: 6px; font-size: .77rem;
  font-weight: 600; color: #0070f2; cursor: pointer; background: #fff;
}
.drop-browse:hover { background: #f0f7ff; }
.drop-zone.has-file .drop-browse { border-color: #2e7d32; color: #2e7d32; }
.file-chosen { display: none; font-size: .8rem; color: #2e7d32; margin-top: .4rem; font-weight: 500; }
.drop-zone.has-file .file-chosen { display: block; }
input[type=file] { display: none; }

/* ── Buttons ── */
.actions { display: flex; gap: .55rem; margin-top: .85rem; flex-wrap: wrap; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: .38rem;
  padding: .48rem 1rem; border-radius: 6px; font-size: .81rem;
  font-weight: 600; cursor: pointer; border: none; transition: all .15s; text-decoration: none;
}
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary { background: #0070f2; color: #fff; }
.btn-primary:not(:disabled):hover  { background: #0060d0; }
.btn-success  { background: #2e7d32; color: #fff; }
.btn-success:not(:disabled):hover  { background: #256428; }
.btn-outline  { background: #fff; color: #0070f2; border: 1.5px solid #0070f2; }
.btn-outline:not(:disabled):hover  { background: #f0f7ff; }
.spin {
  width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.35);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .65s linear infinite; display: none;
}
.btn.loading .spin { display: inline-block; }
.btn.loading .btn-lbl { opacity: .7; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Status ── */
.status-msg {
  display: none; align-items: flex-start; gap: .5rem;
  padding: .65rem .85rem; border-radius: 6px;
  font-size: .81rem; line-height: 1.5; margin-top: .8rem; animation: fadeIn .2s;
}
.status-msg.show { display: flex; }
.status-msg.info { background: #e8f2ff; color: #0050a0; border-left: 4px solid #0070f2; }
.status-msg.ok   { background: #edfaf0; color: #1a6b2e; border-left: 4px solid #2e7d32; }
.status-msg.err  { background: #fff0f0; color: #b71c1c; border-left: 4px solid #c62828; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; } }

/* ── Actions row ── */
.refresh-row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }

/* ── Results wrapper ── */
.results { display: none; }
.results.show { display: block; }

/* ── Mini preview card ── */
.preview-card { display:none; margin-top:1rem; border:1px solid #e4e7ec; border-radius:8px; overflow:hidden; }
.preview-card.show { display:block; }
.preview-hd { font-size:.73rem; font-weight:700; color:#fff; background:#0070f2; text-transform:uppercase; letter-spacing:.07em; padding:.38rem .85rem; }
.preview-fields { display:grid; grid-template-columns:1fr 1fr; gap:.5rem .85rem; padding:.7rem .85rem .5rem; }
.preview-field-lbl { font-size:.72rem; color:#89919a; margin-bottom:.1rem; }
.preview-field-val { font-size:.82rem; font-weight:600; color:#1d2d3e; word-break:break-word; }
.preview-summary-hd { font-size:.73rem; font-weight:700; color:#556b82; text-transform:uppercase; letter-spacing:.07em; padding:.1rem .85rem .25rem; border-top:1px solid #f0f2f5; margin-top:.25rem; }
.preview-summary-txt { font-size:.81rem; color:#2c3e50; line-height:1.65; padding:.0rem .85rem .75rem; }
.preview-cvtext-hd { font-size:.73rem; font-weight:700; color:#556b82; text-transform:uppercase; letter-spacing:.07em; padding:.1rem .85rem .25rem; border-top:1px solid #f0f2f5; }
.preview-cvtext-box { font-size:.78rem; color:#445566; line-height:1.65; padding:0 .85rem .75rem; white-space:pre-wrap; word-break:break-word; max-height:140px; overflow-y:auto; }
.ps-sec { padding:.45rem .85rem; border-top:1px solid #f0f2f5; }
.ps-sec:first-child { border-top:none; }
.ps-sec-lbl { font-size:.68rem; font-weight:700; color:#fff; background:#0070f2; text-transform:uppercase; letter-spacing:.06em; display:inline-block; padding:.15rem .5rem; border-radius:3px; margin-bottom:.3rem; }
.ps-text { font-size:.81rem; color:#2c3e50; line-height:1.65; margin:0; }
.ps-list { list-style:none; padding:0; margin:0; }
.ps-list li { font-size:.81rem; color:#2c3e50; line-height:1.6; padding:.15rem 0 .15rem 1rem; position:relative; }
.ps-list li::before { content:''; position:absolute; left:0; top:.58rem; width:6px; height:6px; border-radius:50%; background:#0070f2; }
</style>
</head>
<body>
<div class="widget">

  <!-- Upload zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
      </svg>
    </div>
    <div class="drop-title" id="dropTitle">Drop your CV here</div>
    <div class="drop-sub">PDF or DOCX — up to 10 MB</div>
    <div class="drop-browse" id="dropBrowse">Browse files</div>
    <div class="file-chosen" id="fileChosen"></div>
    <input type="file" id="fileInput"
      accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"/>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btnUpload" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      <span class="btn-lbl">Upload CV</span>
      <span class="spin"></span>
    </button>
    <button class="btn btn-outline" id="btnProcess" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      <span class="btn-lbl">Process with AI</span>
      <span class="spin"></span>
    </button>
    <a href="view-cv.html" target="_blank" id="btnViewCv"
       style="display:none" class="btn btn-outline">
      &#128196; View CV
    </a>
  </div>

  <div class="status-msg" id="statusMsg">
    <span id="statusIcon"></span>
    <span id="statusText"></span>
  </div>

  <!-- Success state after processing -->
  <div class="results" id="results">
    <div class="refresh-row" style="margin-top:.85rem">
      <button class="btn btn-success" id="btnRefresh">
        &#8635; View activated candidate with AI results
      </button>
    </div>
  </div>

  <!-- Mini preview shown immediately after AI processing -->
  <div class="preview-card" id="previewCard">
    <div class="preview-hd">&#10024; AI Extraction Results</div>
    <div class="preview-fields" id="previewFields"></div>
    <div class="preview-summary-hd">Professional Summary</div>
    <div class="preview-summary-txt" id="previewSummary"></div>
    <div class="preview-cvtext-hd">Extracted CV Text</div>
    <div class="preview-cvtext-box" id="previewCvText"></div>
  </div>

</div>
<script>
(function () {
  'use strict';

  var candidateId = (function () {
    try {
      var m = window.parent.location.hash.match(/Candidates\(ID=([^,)]+)/);
      if (m) { localStorage.setItem('cvCandidateId', m[1]); return m[1]; }
    } catch (e) {}
    return localStorage.getItem('cvCandidateId');
  }());

  var dropZone   = document.getElementById('dropZone');
  var fileInput  = document.getElementById('fileInput');
  var btnUpload  = document.getElementById('btnUpload');
  var btnProcess = document.getElementById('btnProcess');
  var btnViewCv  = document.getElementById('btnViewCv');
  var statusMsg  = document.getElementById('statusMsg');
  var results    = document.getElementById('results');

  /* ── Init ── */
  if (!candidateId) {
    setStatus('err', '&#9888;', 'No candidate selected. Open this page from a candidate record.');
  } else {
    fetchCandidate(function (d) {
      if (!d) return;
      if (d.CVFileName) {
        btnProcess.disabled = false;
        btnViewCv.style.display = 'inline-flex';
        setStatus('info', 'ℹ', 'CV on file: ' + esc(d.CVFileName) + ' — upload a new file or click Process with AI.');
      }
    });
  }

  /* ── Drop zone ── */
  dropZone.addEventListener('dragover',  function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', function ()  { dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer && e.dataTransfer.files[0]) applyFile(e.dataTransfer.files[0]);
  });
  dropZone.addEventListener('click', function () { fileInput.click(); });
  document.getElementById('dropBrowse').addEventListener('click', function (e) {
    e.stopPropagation(); fileInput.click();
  });
  fileInput.addEventListener('change', function () {
    if (this.files && this.files[0]) applyFile(this.files[0]);
  });

  btnUpload.addEventListener('click', doUpload);
  btnProcess.addEventListener('click', doProcess);

  document.getElementById('btnRefresh').addEventListener('click', function () {
    try {
      // If we were in draft context, navigate to the now-active entity instead of reloading
      // (processCV auto-activates drafts, so the draft URL is gone after processing)
      if (candidateId && window.parent.location.hash.indexOf('IsActiveEntity=false') !== -1) {
        window.parent.location.hash = '#/Candidates(ID=' + candidateId + ',IsActiveEntity=true)';
        return;
      }
    } catch (e) {}
    window.parent.location.reload();
  });

  /* ── Helpers ── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setStatus(type, icon, text) {
    statusMsg.className = 'status-msg show ' + type;
    document.getElementById('statusIcon').innerHTML = icon;
    document.getElementById('statusText').textContent = text;
  }

  function setLoading(btn, loading) {
    if (loading) { btn.classList.add('loading'); btn.disabled = true; }
    else { btn.classList.remove('loading'); btn.disabled = false; }
  }

  function adjustHeight() {
    if (window.frameElement) {
      window.frameElement.style.height = (document.documentElement.scrollHeight + 24) + 'px';
    }
  }

  function fetchCandidate(cb) {
    var base = '/candidate/Candidates(ID=' + candidateId + ',IsActiveEntity=';
    fetch(base + 'true)', { headers: { Accept: 'application/json' }, cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error('try draft'); return r.json(); })
      .catch(function () {
        return fetch(base + 'false)', { headers: { Accept: 'application/json' }, cache: 'no-store' })
          .then(function (r) { return r.ok ? r.json() : null; });
      })
      .then(function (d) { cb(d); })
      .catch(function () { cb(null); });
  }

  /* ── File selection ── */
  function applyFile(file) {
    dropZone.classList.add('has-file');
    document.getElementById('dropTitle').textContent = 'File ready to upload';
    document.getElementById('dropBrowse').textContent = 'Change file';
    document.getElementById('fileChosen').textContent = '✓ ' + file.name;
    var dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
    btnUpload.disabled = false;
    setStatus('info', 'ℹ', file.name + ' selected. Click Upload CV to continue.');
  }

  /* ── Upload ── */
  function doUpload() {
    var file = fileInput.files[0];
    if (!file || !candidateId) return;
    setLoading(btnUpload, true);
    setStatus('info', '⏳', 'Uploading ' + esc(file.name) + '…');
    var fd = new FormData();
    fd.append('cv', file, file.name);
    fetch('/upload/' + candidateId, { method: 'POST', body: fd })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        setLoading(btnUpload, false);
        if (d.success) {
          setStatus('ok', '✓', 'Uploaded (' + d.extractedLength.toLocaleString() + ' characters extracted). Now click Process with AI.');
          btnProcess.disabled = false;
          btnViewCv.style.display = 'inline-flex';
        } else {
          setStatus('err', '✕', d.error || 'Upload failed.');
        }
      })
      .catch(function (e) {
        setLoading(btnUpload, false);
        setStatus('err', '✕', 'Upload failed: ' + e.message);
      });
  }

  /* ── Mini preview after processing ── */
  function showPreview(responseStr) {
    var d = null;
    try { d = JSON.parse(responseStr && responseStr.value ? responseStr.value : responseStr); } catch (e) {}
    if (d && (d.AISummary || d.CVText)) {
      try { localStorage.setItem('cvData_' + candidateId, JSON.stringify(d)); } catch (e) {}
      localStorage.setItem('cvProcessed_' + candidateId, Date.now().toString());
      renderPreview(d);
    }
  }

  function renderPreview(d) {
    if (!d || (!d.AISummary && !d.CVText)) return;
    var fields = '';
    if (d.FullName)                  fields += field('Full Name',   d.FullName);
    if (d.CurrentRole)               fields += field('Role',        d.CurrentRole);
    if (d.YearsOfExperience != null) fields += field('Experience',  d.YearsOfExperience + ' yrs');
    if (d.Skills)                    fields += field('Skills',      d.Skills);
    if (d.Email)                     fields += field('Email',       d.Email);
    document.getElementById('previewFields').innerHTML = fields;

    var summaryHtml = '';
    if (d.AISummary) {
      var sections = [
        { key: 'PROFESSIONAL SUMMARY', label: 'Professional Summary' },
        { key: 'KEY STRENGTHS',        label: 'Key Strengths'        },
        { key: 'SUGGESTED ROLE FIT',   label: 'Suggested Role Fit'   }
      ];
      sections.forEach(function (sec, i) {
        var idx = d.AISummary.indexOf(sec.key);
        if (idx === -1) return;
        var nextIdx = -1;
        for (var j = i + 1; j < sections.length; j++) {
          var ni = d.AISummary.indexOf(sections[j].key, idx + sec.key.length);
          if (ni > -1) { nextIdx = ni; break; }
        }
        var content = (nextIdx > -1
          ? d.AISummary.slice(idx + sec.key.length, nextIdx)
          : d.AISummary.slice(idx + sec.key.length)).trim();
        summaryHtml += '<div class="ps-sec"><div class="ps-sec-lbl">' + esc(sec.label) + '</div>';
        if (sec.key === 'KEY STRENGTHS') {
          var items = content.split('\n').filter(function (l) { return l.trim().match(/^[•\-]/); });
          if (items.length) {
            summaryHtml += '<ul class="ps-list">';
            items.forEach(function (it) { summaryHtml += '<li>' + esc(it.replace(/^[\s•\-]+/, '').trim()) + '</li>'; });
            summaryHtml += '</ul>';
          } else { summaryHtml += '<p class="ps-text">' + esc(content) + '</p>'; }
        } else {
          summaryHtml += '<p class="ps-text">' + esc(content) + '</p>';
        }
        summaryHtml += '</div>';
      });
    }
    document.getElementById('previewSummary').innerHTML = summaryHtml || '<p class="ps-text">—</p>';
    document.getElementById('previewCvText').textContent = (d.CVText || '').trim().slice(0, 600) + (d.CVText && d.CVText.length > 600 ? '…' : '');
    document.getElementById('previewCard').classList.add('show');
    adjustHeight();
  }

  function field(lbl, val) {
    return '<div><div class="preview-field-lbl">' + esc(lbl) + '</div><div class="preview-field-val">' + esc(String(val)) + '</div></div>';
  }

  /* ── AI Process ── */
  function doProcess() {
    if (!candidateId) return;
    setLoading(btnProcess, true);
    setStatus('info', '⏳', 'AI is analysing the CV… this usually takes 10–20 seconds.');
    fetch('/candidate/processCV', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ candidateID: candidateId })
    })
    .then(function (r) {
      if (!r.ok) return r.json().then(function (e) { throw new Error((e.error && e.error.message) || 'AI processing failed.'); });
      return r.json();
    })
    .then(function (responseStr) {
      setLoading(btnProcess, false);
      var inDraft = (function () { try { return window.parent.location.hash.indexOf('IsActiveEntity=false') !== -1; } catch (e) { return false; } }());
      setStatus('ok', '✓', inDraft ? 'Done! Click the button below to view the activated candidate.' : 'AI processing complete. Results shown below.');
      results.classList.add('show');
      showPreview(responseStr);
    })
    .catch(function (e) {
      setLoading(btnProcess, false);
      setStatus('err', '✕', e.message || 'AI processing failed.');
    });
  }


}());
</script>
</body>
</html>
