<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Opening CV…</title>
<style>
  body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f7fa; }
  .msg { text-align: center; color: #556b82; }
  .msg h2 { color: #1d2d3e; margin-bottom: .5rem; }
</style>
</head>
<body>
<div class="msg">
  <h2>Opening CV…</h2>
  <p id="status">Looking up candidate…</p>
</div>
<script>
  var id = localStorage.getItem('cvCandidateId');
  if (id) {
    document.getElementById('status').textContent = 'Redirecting to CV file…';
    window.location.replace('/view-cv/' + id);
  } else {
    document.getElementById('status').textContent = 'No candidate selected. Go back and open a candidate record first.';
  }
</script>
</body>
</html>
