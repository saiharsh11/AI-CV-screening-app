_schema-version: "3.1"
ID: cv-screening-app
description: AI-Powered CV Screening Application (CAP + Fiori Elements)
version: 1.0.0

# ─── Build Parameters ─────────────────────────────────────────────────────────
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
        - node -e "require('fs').cpSync('app/candidates/webapp', 'approuter/webapp', {recursive:true})"

# ─── Modules ──────────────────────────────────────────────────────────────────
modules:

  # ── CAP Service ──────────────────────────────────────────────────────────────
  - name: cv-screening-app-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      disk-quota: 512M
      memory: 512M
    build-parameters:
      builder: npm-ci
    requires:
      - name: cv-screening-app-db
      - name: cv-screening-app-xsuaa
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ── HANA DB Deployer ─────────────────────────────────────────────────────────
  - name: cv-screening-app-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: cv-screening-app-db

  # ── Fiori / Approuter ────────────────────────────────────────────────────────
  - name: cv-screening-app
    type: approuter.nodejs
    path: approuter
    parameters:
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: cv-screening-app-xsuaa

# ─── Resources ────────────────────────────────────────────────────────────────
resources:

  - name: cv-screening-app-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: cv-screening-app-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cv-screening-app-${org}-${space}
        tenant-mode: dedicated
